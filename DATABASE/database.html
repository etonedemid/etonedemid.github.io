<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="database.css">
    <img src="../img/ctoslogo.png" alt="logo" width="100" style="position: absolute; top: 10px; left: 10px;">
    <h1 style="text-align: center;">Profiler</h1>
    <style>
        body {
            font-family: Arial, sans-serif; /* Basic font style */
            background-color: #000000; /* Light gray background for contrast */
            padding: 20px; /* Add some padding around the content */
        }
        
        .scrollable-container {
            max-height: 800px; /* Set a maximum height for the scrollable area */
            overflow-y: auto;  /* Enable vertical scrolling */
            border: 1px solid #000000; /* Add a border for visibility */
            padding: 10px; /* Add padding */
            background-color: #000000; /* Set a black background for the container */
            display: grid; /* Use grid for layout */
            grid-template-columns: repeat(auto-fill, minmax(1000px, 2fr)); /* Wider profiles */
            gap: 15px; /* Space between items */
        }

        .person {
            padding: 10px; /* Add padding to each person profile */
            border: 1px solid #ddd; /* Add a border around each profile */
            border-radius: 5px; /* Round the corners */
            background-color: #000000; /* Dark background for each profile */
            color: white; /* White text for better contrast */
            box-sizing: border-box; /* Include padding and border in the width */
        }

        .picture-container img {
            width: 100px; /* Fixed width for images */
            height: auto; /* Maintain aspect ratio */
            float: left; /* Keep the image to the left */

            
        }
    </style>
</head>
<body>

<div id="peopleContainer" class="scrollable-container"></div>

<script>
// Function to fetch people data from JSON file
async function fetchPeople() {
    const response = await fetch('people.json'); // Ensure the path is correct
    if (!response.ok) {
        throw new Error('Network response was not ok');
    }
    return await response.json();
}

// Function to display the people data as HUD-style profiles
async function displayPeople() {
    const container = document.getElementById("peopleContainer");
    container.innerHTML = ''; // Clear previous content if any

    try {
        const fakePeople = await fetchPeople();

        // Check if data is fetched correctly
        console.log(fakePeople); // Debugging line to check fetched data

        // Shuffle and select random people
        const shuffledPeople = fakePeople.sort(() => 0.5 - Math.random()).slice(0, 20); // Display 20 random people
        
        shuffledPeople.forEach(person => {
            const personDiv = document.createElement("div");
            personDiv.classList.add("person");

            personDiv.innerHTML = 
            `
            <div class="people" style="text-align: left;">
                <br>
                <div class="picture-container">
                    <img src="${person.profilePicture}" alt="${person.firstName} ${person.lastName}">
                </div>
                <br>
                <div style="text-align: left;">
                    <p><strong>Name:</strong> ${person.firstName} ${person.lastName}</p>
                    <p><strong>Age:</strong> ${person.age}</p>
                    <p><strong>Email:</strong> ${person.email}</p>
                    <p><strong>Job Title:</strong> ${person.jobTitle}</p>
                    <p><strong>Secret:</strong> ${person.secret}</p> <!-- Display secret -->
                </div>
            </div>
            `;

            container.appendChild(personDiv);
        });
    } catch (error) {
        console.error('Failed to fetch people:', error);
        container.innerHTML = '<p>Error loading profiles. Please try again later.</p>'; // Display error message in UI
    }
}

// Call the function to display people when the page loads
document.addEventListener("DOMContentLoaded", displayPeople);
</script>

</body>
</html>
